<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#090716" />
  <title>Metro Nexus — The Living Stacks</title>
  <link rel="stylesheet" href="./src/app.css?v=transit-os-1" />
</head>
<body>
  <div id="root"></div>
  <script>
    (() => {
      const lines = [
        {id:'kaal',name:'Kaal Chakra',catalogue:'KC—1988',district:'Nyay Nagar',genre:'Noir / Detectives',color:'#ff4f9a',tint:'pink',route:'Court Quarter → Foundry → Rain Gate',description:'A rain-polished route through the city’s old judicial and industrial memory. Every platform keeps a secret in the margins.',note:'The rail hums like a case file being reopened.'},
        {id:'smriti',name:'Smriti Nexus',catalogue:'SN—2012',district:'Vidya Vihar',genre:'Coming-of-age / Adventure',color:'#62f3bd',tint:'mint',route:'Root Terminal → Open Quad → Moss Gardens',description:'The memory line for first chapters: campuses, open quadrangles, and the bright detours that make a city feel newly discovered.',note:'A quiet carriage can contain an entire future.'},
        {id:'silicon',name:'Silicon Sarai',catalogue:'SS—2030',district:'Circuit Colony',genre:'Hard science fiction',color:'#52b6ff',tint:'blue',route:'Packet Square → Node 88 → Glass Mile',description:'A high-speed index of the compute district, threading server towers and midnight laboratories into one cobalt corridor.',note:'The city compiles itself between stations.'},
        {id:'rangmahal',name:'Rangmahal',catalogue:'RM—2018',district:'Kalakriti Quarter',genre:'Magical realism',color:'#b68cff',tint:'violet',route:'Marigold Steps → Lantern Hall → Dream Market',description:'A moving gallery connecting mural-lined theatres, night markets, and stories that refuse to remain inside their frames.',note:'Some shadows ask to ride two stops farther.'},
        {id:'haveli',name:'Purani Haveli',catalogue:'PH—1857',district:'Chandni Kila',genre:'Gothic / Mythology',color:'#d4ff58',tint:'lime',route:'Stone Archive → Kila Gate → Ancestral Well',description:'The oldest book in the network: sandstone arches, fibre-optic veins, and a route through the city’s inherited voices.',note:'The walls remember each hand that has passed.'}
      ];
      const initialReviews = [
        {id:1,line:'smriti',author:'Mira J.',score:5,text:'The quiet carriage between Root Terminal and Open Quad is beautifully paced.',type:'Rider note',time:'12 min ago'},
        {id:2,line:'silicon',author:'C. Rao',score:4,text:'Node 88 signage was clear. The platform transfer could use one more live display.',type:'Rider note',time:'28 min ago'},
        {id:3,line:'kaal',author:'Asha P.',score:3,text:'Please check the reading lights in the third carriage near Rain Gate.',type:'Line report',time:'43 min ago'}
      ];
      const load = (key, fallback) => { try { return JSON.parse(localStorage.getItem(key)) || fallback } catch { return fallback } };
      const makeId = () => `NX-${new Date().getFullYear()}-${(crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36)).replaceAll('-','').slice(0,8).toUpperCase()}`;
      const migrateReviews = reviews => reviews.map(note => note.line === 'gyan' ? {...note,line:'smriti'} : note);
      const state = { view:'archive', transitMode:'atlas', selected:2, turning:false, reviews:migrateReviews(load('mn-reviews', initialReviews)), profile:load('mn-profile', {id:makeId(),name:'Unclaimed reader',joined:'12 JUL 2038'}), rating:5, reportType:'Rider note', toast:'' };
      const root = document.querySelector('#root');
      const active = () => lines[state.selected];
      const nav = [['archive','Archive'],['brand','Brand identity'],['transit','Transit OS'],['experience','Experience'],['id','Nexus ID']];
      const esc = (value) => String(value).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
      const selectOptions = (selected) => lines.map(line => `<option value="${line.id}" ${line.id === selected ? 'selected':''}>${line.name}</option>`).join('');
      const header = () => `<header class="topbar"><button class="brand" data-view="archive" aria-label="Metro Nexus archive home"><span class="brand-mark"><i></i><i></i><i></i></span><span><strong>METRO NEXUS</strong><small>THE LIVING STACKS · 2038</small></span></button><nav class="nav" aria-label="Main navigation">${nav.map(([id,label]) => `<button class="${state.view===id?'is-active':''}" data-view="${id}">${label}</button>`).join('')}</nav><button class="id-chip" data-view="id"><span class="pulse-dot"></span>${state.profile.id.slice(-8)}</button></header>`;
      const archive = () => { const line=active(); return `<section class="hero section-wrap"><div class="hero-copy"><p class="eyebrow"><span></span>DELHI NCR METRO SYSTEM · 2038</p><h1>Your city.<br><em>In motion.</em></h1><p class="lede"><b>Metro Nexus is an AI-powered metro system for Delhi NCR in 2038.</b> It is more than a train map: plan a route, check live departures, carry a digital pass, and explore every line as a living archive of the city.</p><div class="hero-actions"><button class="primary-button" data-view="transit">Open Transit OS <b>↗</b></button><button class="text-button" data-view="brand">Why Metro Nexus <b>→</b></button></div><div class="archive-stats"><div><strong>05</strong><span>metro lines</span></div><div><strong>84</strong><span>indexed stations</span></div><div><strong>24/7</strong><span>AI network</span></div></div></div><div class="hero-book-stage"><div class="book-orbit orbit-a"></div><div class="book-orbit orbit-b"></div><article class="hero-book ${line.tint} ${state.turning?'is-turning':''}"><div class="book-spine"><span>METRO NEXUS</span><b>${line.catalogue}</b></div><div class="book-cover"><p>VOLUME ${String(state.selected+1).padStart(2,'0')} / 05</p><div class="cover-symbol">✦</div><h2>${line.name}</h2><span>${line.genre}</span><div class="cover-route"><i></i>${line.district}</div></div><div class="book-pages"></div></article><div class="book-controls"><button data-next="-1" aria-label="Previous metro line">←</button><span>${String(state.selected+1).padStart(2,'0')} — 05</span><button data-next="1" aria-label="Next metro line">→</button></div></div></section><section class="section-wrap chapter-grid"><div class="chapter-intro"><p class="eyebrow"><span></span>EXPLORE THE METRO NETWORK</p><h2>Choose your<br><em>next line.</em></h2><p>Each colour is a physical metro line, a distinct neighbourhood, and a genre through which to read the city.</p></div><div class="chapter-list">${lines.map((item,index)=>`<button class="chapter-row ${index===state.selected?'is-selected':''}" data-select="${index}" style="--line:${item.color}"><span class="chapter-number">0${index+1}</span><span class="chapter-name"><b>${item.name}</b><small>${item.district} · ${item.genre}</small></span><span class="chapter-arrow">↗</span></button>`).join('')}</div></section>`; };
      const folios = () => { const line=active(); return `<section class="section-wrap folio-layout"><aside class="folio-index"><p class="eyebrow"><span></span>THE STACK INDEX</p><h1>Line<br><em>folios.</em></h1><p>Turn through the collection, one moving story at a time.</p><div class="mini-index">${lines.map((item,index)=>`<button class="${state.selected===index?'active':''}" data-select="${index}"><i style="background:${item.color}"></i>0${index+1}<span>${item.name}</span></button>`).join('')}</div></aside><article class="open-folio ${line.tint}"><div class="folio-top"><span>CATALOGUE / ${line.catalogue}</span><span>FOLIO ${String(state.selected+1).padStart(2,'0')} OF 05</span></div><div class="folio-pages ${state.turning?'turning':''}"><div class="folio-page left-page"><p class="folio-kicker">A route in ${line.genre}</p><h2>${line.name}</h2><div class="folio-rule"></div><p class="serif-copy">${line.description}</p><blockquote>“${line.note}”</blockquote><div class="page-footer"><span>${line.district.toUpperCase()}</span><span>01</span></div></div><div class="folio-page right-page"><span class="route-label">ROUTE ANNOTATION</span><div class="route-map" style="--book:${line.color}"><i class="node n1"></i><i class="node n2"></i><i class="node n3"></i><i class="node n4"></i><svg viewBox="0 0 270 210" preserveAspectRatio="none"><path d="M4 175 C70 185 70 40 144 83 S205 192 265 35"/></svg></div><p class="route-title">${line.route}</p><div class="folio-tags"><span>LIVE INDEX</span><span>ACCESSIBLE</span><span>STORY-RICH</span></div><button class="primary-button compact" data-view="map">Locate in the city <b>↗</b></button><div class="page-footer"><span>METRO NEXUS</span><span>02</span></div></div></div><div class="folio-controls"><button data-next="-1">← Previous</button><span>Use the controls to turn the page</span><button data-next="1">Next →</button></div></article></section>`; };
      const map = () => { const line=active(); const paths=['M76 153 C188 93 255 234 403 180 S596 107 721 197','M101 369 C245 295 267 98 414 120 S580 331 719 378','M133 78 C211 185 328 208 416 296 S570 417 710 461','M94 488 C194 377 363 463 438 359 S580 242 716 102','M87 291 C224 282 309 369 420 400 S569 412 705 277']; return `<section class="section-wrap atlas-layout"><div class="atlas-copy"><p class="eyebrow"><span></span>ATLAS / DELHI-NCR 2038</p><h1>How the city<br><em>reads itself.</em></h1><p>Five volumes wind around a fictionalized city. Intersections are cross-references; each terminal opens onto a different kind of story.</p><div class="atlas-key">${lines.map((item,index)=>`<button data-select="${index}" class="${state.selected===index?'active':''}"><i style="background-color:${item.color}"></i>${item.name}<span>↗</span></button>`).join('')}</div></div><div class="map-card"><div class="map-label label-one">NYAY<br>NAGAR</div><div class="map-label label-two">CIRCUIT<br>COLONY</div><div class="map-label label-three">VIDYA<br>VIHAR</div><div class="map-label label-four">KALAKRITI<br>QUARTER</div><div class="map-label label-five">CHANDNI<br>KILA</div><svg viewBox="0 0 760 570" role="img" aria-label="Metro Nexus fictional city line map"><g class="districts"><path d="M60 72 240 44 328 160 226 255 62 210Z"/><path d="m328 160 185-96 185 101-95 144-164 18Z"/><path d="m60 210 166 45 73 142-187 92-70-131Z"/><path d="m226 255 213 72 59 136-199 42-73-113Z"/><path d="m603 309 95-144 81 62-9 198-164 56-108-18Z"/></g>${lines.map((item,index)=>`<path data-select="${index}" class="metro-path ${state.selected===index?'selected':''}" style="stroke:${item.color}" d="${paths[index]}"/>`).join('')}<g class="stations">${[[76,153],[210,136],[403,180],[566,129],[721,197],[101,369],[262,264],[414,120],[582,331],[719,378],[133,78],[328,208],[416,296],[570,417],[710,461],[94,488],[363,463],[438,359],[580,242],[716,102],[87,291],[309,369],[420,400],[569,412],[705,277]].map(([x,y],i)=>`<circle cx="${x}" cy="${y}" r="${i%4===0?8:5}"/>`).join('')}</g></svg><div class="map-folio"><span>YOU ARE READING</span><b style="color:${line.color}">${line.name}</b><p>${line.route}</p></div></div><div class="line-intro" style="--line:${line.color}"><span>VOLUME ${String(state.selected+1).padStart(2,'0')}</span><h2>${line.name}</h2><p>${line.description}</p><small>${line.district} · ${line.genre}</small></div></section>`; };
      const transit = () => { const line=active(); const notes=state.reviews.filter(note=>note.line===line.id); const modes=[['atlas','City Atlas','MAP'],['folios','Line Folios','FOLIO'],['route','Route UI','ROUTE'],['status','Departures','LIVE'],['passenger','Passenger','MEMORY'],['pass','Ticket / Pass','ACCESS']]; const departure={kaal:['02 min','Platform 2','Medium crowd'],smriti:['04 min','Platform 1','Quiet carriage'],silicon:['01 min','Platform 4','High demand'],rangmahal:['06 min','Platform 3','Open boarding'],haveli:['03 min','Platform 5','Steady flow']}[line.id]; const views={atlas:()=>`<div class="transit-embedded atlas-embed">${map()}</div>`,folios:()=>`<div class="transit-embedded folio-embed">${folios()}</div>`,route:()=>`<section class="os-panel route-panel"><div class="os-panel-head"><div><p class="eyebrow"><span></span>NAVIGATION / ACTIVE ROUTE</p><h2>Plan the next <em>chapter.</em></h2></div><span class="system-state">AI ROUTING ACTIVE</span></div><label class="os-search">STATION OR DISTRICT SEARCH<input type="search" placeholder="Try Node 88, Kila Gate, Vidya Vihar" autocomplete="off"></label><div class="route-state" style="--line:${line.color}"><span>NOW READING / ${line.catalogue}</span><b>${line.name}</b><p>${line.route}</p><i></i></div><div class="os-line-switcher"><span>SWITCH LINE</span>${lines.map((item,index)=>`<button data-select="${index}" class="${index===state.selected?'active':''}" style="--line:${item.color}"><i></i>${item.name}</button>`).join('')}</div></section>`,status:()=>`<section class="os-panel status-panel"><div class="os-panel-head"><div><p class="eyebrow"><span></span>DEPARTURES / LIVE INDEX</p><h2>${line.name}<br><em>is moving.</em></h2></div><span class="system-state">NETWORK CLEAR</span></div><div class="departure-grid"><article><span>NEXT TRAIN</span><strong>${departure[0]}</strong><p>${line.route.split(' → ')[0]} bound</p></article><article><span>BOARDING</span><strong>${departure[1]}</strong><p>Doors open in 48 seconds</p></article><article><span>CROWD INDEX</span><strong>${departure[2]}</strong><p>AI flow estimate · 92% confident</p></article></div><div class="status-strip"><i></i><p><b>Service note:</b> All stations on ${line.name} are indexed and accessible.</p><time>UPDATED 11:08</time></div></section>`,passenger:()=>`<section class="os-panel passenger-panel"><div class="os-panel-head"><div><p class="eyebrow"><span></span>PASSENGER EXPERIENCE / MEMORY</p><h2>What riders<br><em>leave behind.</em></h2></div><button class="text-button" data-view="experience">Open ledger <b>→</b></button></div><div class="memory-grid"><article><span>LINE IMPRESSION</span><h3>${line.district}</h3><p>${line.note}</p></article><article><span>COMMUNITY LEDGER</span><h3>${notes.length} annotations</h3><p>${notes[0]?esc(notes[0].text):'This line is ready for its first rider memory.'}</p></article><article><span>JOURNEY FRAGMENT</span><h3>${line.genre}</h3><p>Every station stays readable long after the train has gone.</p></article></div></section>`,pass:()=>`<section class="os-panel pass-panel"><div class="os-panel-head"><div><p class="eyebrow"><span></span>ACCESS CREDENTIAL / TICKET PASS</p><h2>Carry the <em>network.</em></h2></div><span class="system-state">VALID TODAY</span></div><article class="transit-pass" style="--line:${line.color}"><div><span>METRO NEXUS / 2038</span><b>ALL-LINE<br>READER PASS</b></div><div><small>HOLDER</small><strong>${esc(state.profile.name)}</strong><small>ACCESS ID</small><em>${state.profile.id}</em></div><i class="pass-chip"></i></article><div class="pass-notes"><p><b>One pass, many layers.</b> Use it for gates, route saves, traveller notes, and your personal city archive.</p><button class="text-button" data-view="id">View Nexus ID <b>→</b></button></div></section>`}; return `<section class="transit-os section-wrap"><aside class="transit-dock"><div><p class="eyebrow"><span></span>METRO NEXUS</p><h1>Transit<br><em>OS.</em></h1><p>The control layer for Delhi NCR’s AI-powered metro library.</p></div><nav class="transit-modes" role="tablist" aria-label="Transit OS views">${modes.map(([id,label,code])=>`<button role="tab" aria-selected="${state.transitMode===id}" data-transit="${id}" class="${state.transitMode===id?'active':''}"><i>${code}</i><span>${label}</span><b>→</b></button>`).join('')}</nav><div class="dock-status"><i></i>NETWORK SYNCHRONIZED<br><span>DELHI NCR / 2038</span></div></aside><div class="transit-stage" aria-live="polite">${views[state.transitMode]()}</div></section>`; };
      const experience = () => { const line=active(); const notes=state.reviews.filter(item=>item.line===line.id); const beats=[['07:42','Open the folio','Your Nexus ID recalls the routes and saved city passages you have chosen to keep.'],['07:48','Enter the stacks','The station board writes the clearest route decision in the margin, before you board.'],['07:55','Travel the chapter','Live accessibility, crowding and service updates become a readable travel timeline.'],['08:12','Leave a mark','Rate the journey or send a line-specific report. Your note is added to the public ledger.']]; return `<section class="section-wrap experience-layout"><div class="experience-heading"><p class="eyebrow"><span></span>RIDER EXPERIENCE / ANNOTATED</p><h1>A journey told<br>in <em>five beats.</em></h1><p>Instead of a decorative scene, the service itself is the illustration: a clear timeline of what a rider sees, knows, and can improve.</p></div><div class="journey-timeline">${beats.map(([time,title,copy],index)=>`<article class="timeline-entry"><div class="timeline-time">${time}</div><div class="timeline-node"><i>${index+1}</i></div><div class="timeline-content"><span>CHAPTER 0${index+1}</span><h2>${title}</h2><p>${copy}</p></div></article>`).join('')}</div><div class="feedback-grid"><article class="review-form-card"><p class="eyebrow"><span></span>ADD TO THE LEDGER</p><h2>How was your<br><em>passage?</em></h2><form id="review-form"><label>Line<select name="line" data-line-select aria-label="Choose the line whose ledger you are viewing">${selectOptions(line.id)}</select></label><p class="form-note">The form and ledger follow this active line.</p><div class="score-row"><span>Rating</span><div>${[1,2,3,4,5].map(score=>`<button type="button" data-rate="${score}" class="${score<=state.rating?'filled':''}" aria-label="${score} star rating">★</button>`).join('')}</div></div><div class="type-toggle"><button type="button" data-type="Rider note" class="${state.reportType==='Rider note'?'selected':''}">Rider note</button><button type="button" data-type="Line report" class="${state.reportType==='Line report'?'selected':''}">Report an issue</button></div><textarea name="text" placeholder="${state.reportType==='Line report'?'Tell the line stewards what needs attention…':'Leave a note for future riders…'}" maxlength="360" required></textarea><p class="form-note">Posting as ${esc(state.profile.name)} · visible in the community ledger</p><button class="primary-button compact" type="submit">${state.reportType==='Line report'?'Submit report':'Publish note'} <b>↗</b></button></form></article><article class="review-ledger"><div class="ledger-head"><div><p class="eyebrow"><span></span>LIVE COMMUNITY LEDGER</p><h2>${line.name}</h2></div><span>${notes.length} NOTES</span></div>${notes.length?`<div class="reviews">${notes.slice(0,4).map(note=>`<div class="review"><div class="review-meta"><strong>${esc(note.author)}</strong><span>${'★'.repeat(note.score)}<i>${'★'.repeat(5-note.score)}</i></span></div><p>${esc(note.text)}</p><footer><b>${note.type}</b><time>${note.time}</time></footer></div>`).join('')}</div>`:'<div class="empty-ledger">This folio is waiting for its first annotation.</div>'}</article></div></section>`; };
      const brand = () => `<section class="section-wrap brand-identity"><div class="brand-identity-hero"><p class="eyebrow"><span></span>ORIENTATION RECORD / DELHI NCR, 2038</p><p class="brand-kicker">A public transport memory system</p><h1 class="neon-sign" data-text="Metro Nexus">Metro Nexus</h1><p class="brand-setting">Delhi NCR, 2038 — a living library for a city in motion.</p><p class="brand-intro">Metro Nexus is an imagined metro archive where routes read like volumes, stations become pages, and each shared journey leaves a trace for the next reader.</p><div class="brand-actions"><button class="primary-button" data-view="lines">Browse the folios <b>↗</b></button><button class="text-button" data-view="experience">Read rider records <b>→</b></button></div></div><div class="brand-architecture" aria-label="How to use Metro Nexus"><article class="brand-card philosophy"><span>01 / PHILOSOPHY</span><h2>The city is a library.</h2><p>The metro is its indexing system. Every line holds a genre, every station opens a page, and each journey adds rhythm, memory, and lived experience to a collective public record.</p></article><article class="brand-card aim"><span>02 / AIM</span><h2>Follow a route. Find a story.</h2><p>Explore Delhi NCR through line folios, station records, city paths, reviews, and small fragments left by other riders. The archive is made for discovery, not just directions.</p></article><article class="brand-card architecture"><span>03 / ARCHITECTURE</span><h2>Read it in layers.</h2><p>Start with a volume, turn its folio, locate it in the atlas, then open the Experience ledger. Digital books, floating signals, route marks, and rider notes all cross-reference one another.</p><p class="brand-ai"><b>AI-assisted indexing:</b> a quiet intelligence groups route records, surfaces useful rider patterns, and links memory fragments while the archive remains human-led.</p><div class="archive-key"><i></i><i></i><i></i><b>LINES → FOLIOS → ATLAS → LEDGER</b></div></article></div></section>`;
      const id = () => `<section class="section-wrap id-layout"><div class="id-heading"><p class="eyebrow"><span></span>PERSONAL READER RECORD</p><h1>Your movement<br>has a <em>margin.</em></h1><p>Every visitor receives a unique Nexus ID. It connects their saved routes, annotations, and service notes without making the city feel anonymous.</p><form id="profile-form" class="name-form"><label>Reader name<input name="name" value="${esc(state.profile.name)}" maxlength="40"></label><button class="text-button" type="submit">Update record →</button></form></div><article class="nexus-card"><div class="card-top"><span>NEXUS / CITIZEN FOLIO</span><b>ACTIVE</b></div><div class="card-center"><div class="avatar">${esc(state.profile.name.slice(0,1).toUpperCase())}</div><div><small>READER OF RECORD</small><h2>${esc(state.profile.name)}</h2><p>Joined the stacks · ${state.profile.joined}</p></div></div><div class="id-number"><span>UNIQUE NEXUS ID</span><strong>${state.profile.id}</strong><button data-copy aria-label="Copy Nexus ID">⧉</button></div><div class="card-bottom"><div class="qr-grid" aria-hidden="true">${Array.from({length:49},(_,i)=>`<i class="${[0,1,5,7,9,11,14,16,18,22,24,25,27,30,33,35,39,41,44,46,48].includes(i)?'on':''}"></i>`).join('')}</div><p>Scan at any gate to retrieve<br>your saved city passages.</p><span>ISSUED ONCE<br>HELD LOCALLY</span></div></article><div class="id-promise"><span>01</span><p><b>Uniquely assigned.</b> This browser issues and keeps one ID for you.</p><span>02</span><p><b>Useful by design.</b> Your feedback and saved folios can carry a consistent reader signature.</p></div></section>`;

szmaMm/qLr97DKoXjTidwXt6TG1Nk9H3Qyn0s5TPR/apN8eHn';
        const brand = root.querySelector('.brand');
        if (brand) brand.innerHTML = `<img class="brand-logo brand-lockup" src="${headerLockupAsset}" alt="Metro Nexus">`;
        if (state.view === 'archive') {
          root.querySelector('.hero-copy')?.insertAdjacentHTML('afterbegin', `<div class="hero-brand" aria-label="Metro Nexus"><img class="hero-lockup" src="${headerLockupAsset}" alt="Metro Nexus"></div>`);
          const coverMark = root.querySelector('.cover-symbol');
          if (coverMark) coverMark.outerHTML = `<img class="cover-logo" src="${headerLockupAsset}" alt="Metro Nexus">`;
        }
        if (state.view === 'lines') root.querySelector('.folio-top')?.insertAdjacentHTML('afterbegin', `<img class="folio-logo" src="${headerLockupAsset}" alt="Metro Nexus">`);
        if (state.view === 'id') {
          const cardLabel = root.querySelector('.card-top span');
          if (cardLabel) cardLabel.outerHTML = `<img class="id-logo" src="${headerLockupAsset}" alt="Metro Nexus">`;
        }
        if (state.view === 'transit') {
          const statusCard = root.querySelector('.status-panel .departure-grid article');
          if (statusCard) statusCard.insertAdjacentHTML('beforeend', `<div class="live-train-counter" aria-live="polite"><i></i><span>SYSTEM PULSE</span><b data-live-count>18</b><small><em>RIDERS SYNCED</em><time data-live-refresh>30s</time></small></div>`);
          const transitPass = root.querySelector('.transit-pass');
          if (transitPass) { const passTitle=transitPass.querySelector('b'); if(passTitle) passTitle.innerHTML='TRANSIT<br>ARCHIVE PASS'; transitPass.insertAdjacentHTML('beforeend', `<div class="pass-route-detail" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i></div><div class="pass-index"><span>CLASS / ARCHIVIST</span><span>ZONE / NCR ALL</span><span>INDEX / MN-04</span></div>`); }
        }
      };
      const render = () => { const pages={archive,transit,brand,experience,id}; root.innerHTML = `<div class="app-shell"><div class="aurora aurora-one"></div><div class="aurora aurora-two"></div><div class="aurora aurora-three"></div><div class="archive-motes" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i><i></i></div><div class="graphics-accent graphic-pill" aria-hidden="true"></div><div class="graphics-accent graphic-ring" aria-hidden="true"></div><div class="graphics-accent graphic-star" aria-hidden="true"></div><div class="graphics-accent graphic-panel" aria-hidden="true"></div><div class="cursor-orb pink-orb"></div><div class="cursor-orb purple-orb"></div><div class="scanlines"></div>${header()}<main>${pages[state.view]()}</main>${state.toast?`<div class="toast" role="status">✦ ${state.toast}</div>`:''}<footer><span>METRO NEXUS / PUBLIC TRANSPORT MEMORY SYSTEM</span><span>NO STORIES ARE LOST IN TRANSIT</span></footer></div>`; decorateBrand(); };
      const refresh = (message='') => { if(message){state.toast=message; setTimeout(()=>{state.toast='';render()},3000)} render() };
      let pageTurnTimer;
      const turnTo = nextIndex => { if(state.turning || nextIndex===state.selected) return; clearTimeout(pageTurnTimer); state.turning=true; render(); pageTurnTimer=setTimeout(()=>{ state.selected=nextIndex; state.turning=false; render(); },380); };
      root.addEventListener('click', async event => { const target=event.target.closest('button,[data-select]'); if(!target) return; if(target.dataset.transit){state.view='transit';state.transitMode=target.dataset.transit;refresh();return} if(target.dataset.view){if(target.dataset.view==='map'){state.view='transit';state.transitMode='atlas';refresh();return} if(target.dataset.view==='lines'){state.view='transit';state.transitMode='folios';refresh();return} state.view=target.dataset.view;refresh();return} if(target.dataset.select!==undefined){const nextIndex=Number(target.dataset.select);if(state.view==='transit'&&state.transitMode!=='folios'){state.selected=nextIndex;refresh();return}turnTo(nextIndex);return} if(target.dataset.next){turnTo((state.selected+Number(target.dataset.next)+lines.length)%lines.length);return} if(target.dataset.rate){state.rating=Number(target.dataset.rate);refresh();return} if(target.dataset.type){state.reportType=target.dataset.type;refresh();return} if(target.hasAttribute('data-copy')){try{await navigator.clipboard.writeText(state.profile.id);refresh('Nexus ID copied to your clipboard.')}catch{refresh(state.profile.id)} } });
      root.addEventListener('change', event => { if(!event.target.matches('[data-line-select]')) return; const nextIndex=lines.findIndex(line=>line.id===event.target.value); if(nextIndex<0 || nextIndex===state.selected) return; state.selected=nextIndex; refresh(); });
      root.addEventListener('submit', event => { event.preventDefault(); const form=new FormData(event.target); if(event.target.id==='review-form'){const text=String(form.get('text')||'').trim();if(!text)return;state.reviews.unshift({id:Date.now(),line:String(form.get('line')),author:state.profile.name,score:state.rating,text,type:state.reportType,time:'Just now'});localStorage.setItem('mn-reviews',JSON.stringify(state.reviews));refresh(state.reportType==='Line report'?'Report indexed in the line ledger.':'Your rider note is now in the public ledger.')} if(event.target.id==='profile-form'){state.profile.name=String(form.get('name')||'').trim()||'Unclaimed reader';localStorage.setItem('mn-profile',JSON.stringify(state.profile));refresh('Reader record updated.')} });
      let liveCycleStarted=Date.now();
      const updateLiveCounter=()=>{ let elapsed=Math.floor((Date.now()-liveCycleStarted)/1000); if(elapsed>=30){liveCycleStarted=Date.now();elapsed=0} const count=root.querySelector('[data-live-count]'); const refreshTime=root.querySelector('[data-live-refresh]'); if(count) count.textContent=String(18+elapsed).padStart(2,'0'); if(refreshTime) refreshTime.textContent=`${String(30-elapsed).padStart(2,'0')}s`; };
      window.setInterval(updateLiveCounter,1000);
      let pointerFrame=0, pointerX=0, pointerY=0;
      const updateOrbs = () => { pointerFrame=0; root.querySelectorAll('.cursor-orb').forEach(orb => { const box=orb.getBoundingClientRect(); const distance=Math.hypot(pointerX-(box.left+box.width/2),pointerY-(box.top+box.height/2)); orb.classList.toggle('is-nudged',distance<Math.max(box.width,box.height)*.64); }); };
      window.addEventListener('pointermove', event => { pointerX=event.clientX; pointerY=event.clientY; if(!pointerFrame) pointerFrame=requestAnimationFrame(updateOrbs); }, { passive:true });
      window.addEventListener('blur', () => root.querySelectorAll('.cursor-orb').forEach(orb=>orb.classList.remove('is-nudged')));
      render();
    })();
